[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/ko"
  to = "/ko/"
  status = 301

[[redirects]]
  from = "/en"
  to = "/en/"
  status = 301
